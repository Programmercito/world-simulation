<div class="canvas-wrapper">
	<div class="config-panel" *ngIf="!simulationStarted">
		<h3>Configuración Inicial</h3>
		<div class="config-group">
			<label>Ancho del mundo (px):
				<input type="number" [(ngModel)]="worldWidth" min="500" max="5000" />
			</label>
		</div>
		<div class="config-group">
			<label>Alto del mundo (px):
				<input type="number" [(ngModel)]="worldHeight" min="500" max="5000" />
			</label>
		</div>
		<div class="config-group">
			<label>Comida inicial:
				<input type="number" [(ngModel)]="initialFood" min="1" max="5000" />
			</label>
		</div>
		<div class="config-group">
			<label>Civilizaciones:
				<input type="number" [(ngModel)]="initialCivilizations" min="1" max="20" />
			</label>
		</div>
		<div class="config-group">
			<label>Individuos por civilización:
				<input type="number" [(ngModel)]="initialIndividuals" min="1" max="100" />
			</label>
		</div>
		<div class="config-group">
			<label>Aparición de comida cada (segundos, 0=nunca):
				<input type="number" [(ngModel)]="foodSpawnInterval" min="0" max="60" step="0.1" />
			</label>
		</div>
		<button class="start-btn" (click)="startSimulation()">Iniciar Simulación</button>
	</div>

	<div class="canvas-info" *ngIf="simulationStarted">
		<div class="canvas-size">Canvas: <span id="canvasSize" #canvasSize>2000x2000</span></div>
		<div class="info-panels">
			<div class="stats" #statsDiv>
				<h4>Estadísticas</h4>
				<div class="stat food-interval-control">
					<strong>Intervalo de comida (seg):</strong>
					<div class="interval-controls">
						<button class="interval-btn" (click)="decreaseFoodInterval()">-</button>
						<span class="interval-value">{{currentFoodInterval}}</span>
						<button class="interval-btn" (click)="increaseFoodInterval()">+</button>
					</div>
				</div>
				<div class="stat"><strong>Población:</strong> <span id="population">0</span></div>
				<div class="stat"><strong>Comida:</strong> <span id="food">0</span></div>
				<div class="stat"><strong>Buscando pareja:</strong> <span id="seeking">0</span></div>
				<div class="stat"><strong>Tick:</strong> <span id="tick">0</span></div>
				<button class="add-food-btn" (click)="addFood()">+ Agregar Comida</button>
			</div>
			<div class="civilizations-panel">
				<h4>Civilizaciones</h4>
				<div class="civ-list">
					<div class="civ-item" *ngFor="let civ of civilizations">
						<span class="civ-color" [style.background-color]="civ.color"></span>
						<span class="civ-name">{{civ.name}}</span>
						<span class="civ-count">{{civ.population}}</span>
						<span class="civ-kills" title="Kills">⚔️{{civ.kills}}</span>
					</div>
				</div>
			</div>
		</div>
	</div>
	<canvas #worldCanvas id="world" [width]="worldWidth" [height]="worldHeight" *ngIf="simulationStarted"></canvas>
</div>
